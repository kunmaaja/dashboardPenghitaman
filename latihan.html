<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAMA — Latihan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a class="topbar-brand" href="dashboard.html">
          <div class="logo">H</div>
          <div class="brand-text"><h2>HAMA</h2><p>Pembelajaran Interaktif</p></div>
        </a>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Lipat/Buka Sidebar">
          <span></span><span></span><span></span>
        </button>
      </div>
      <p class="sidebar-label">Navigasi</p>
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label"> Home</span></a>
      <a href="materi.html" class="nav-item"><span class="nav-icon">📖</span><span class="nav-label"> Materi</span></a>
      <a href="video.html" class="nav-item"><span class="nav-icon">▶️</span><span class="nav-label"> Video</span></a>
      <a href="latihan.html" class="nav-item active"><span class="nav-icon">📋</span><span class="nav-label"> Latihan</span></a>
    </nav>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-user">
          <div class="user-chip"><div class="user-avatar">👤</div><span id="topbar-name">Siswa</span></div>
          <button class="logout-btn" onclick="logout()">🚪</button>
        </div>
      </header>

      <main class="main">
        <div class="page">
          <p class="eyebrow">Latihan Soal</p>
          <h1 class="page-title">Uji Pemahamanmu</h1>
          <p class="page-sub">Kerjakan soal latihan berikut untuk mengukur seberapa jauh kamu memahami materi peralatan kantor.</p>

          <div class="quiz-iframe-wrap" id="quiz-wrap">
            <div class="quiz-notice">
              <div class="quiz-notice-left">
                <span class="quiz-notice-icon">📋</span>
                Kerjakan soal di bawah ini dengan teliti. Pastikan koneksi internet stabil.
              </div>
              <button class="btn btn-outline btn-sm" id="btn-fullscreen">
                🔍 Perbesar Layar
              </button>
            </div>
            <iframe
              src="https://wayground.com/admin/quiz/6a073184ba289bbdec67aef1"
              title="Latihan Soal HAMA"
              allowfullscreen
              loading="lazy"
            ></iframe>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    // --- SIDEBAR LOGIC ---
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebar-toggle');
    const COLLAPSED_KEY = 'hamaSidebarCollapsed';

    function checkScreenSize() {
      if (window.innerWidth <= 768) {
        sidebar.classList.add('collapsed');
      } else {
        if (localStorage.getItem(COLLAPSED_KEY) === '1') sidebar.classList.add('collapsed');
        else sidebar.classList.remove('collapsed');
      }
    }
    window.addEventListener('resize', checkScreenSize);
    checkScreenSize();

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      if (window.innerWidth > 768) localStorage.setItem(COLLAPSED_KEY, sidebar.classList.contains('collapsed') ? '1' : '0');
    });

    // --- FULLSCREEN LOGIC ---
    const quizWrap = document.getElementById('quiz-wrap');
    const btnFullscreen = document.getElementById('btn-fullscreen');

    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        // Masuk Fullscreen
        if (quizWrap.requestFullscreen) {
          quizWrap.requestFullscreen();
        } else if (quizWrap.webkitRequestFullscreen) { /* Safari */
          quizWrap.webkitRequestFullscreen();
        } else if (quizWrap.msRequestFullscreen) { /* IE11 */
          quizWrap.msRequestFullscreen();
        }
      } else {
        // Keluar Fullscreen
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) { /* Safari */
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) { /* IE11 */
          document.msExitFullscreen();
        }
      }
    });

    // Ubah teks tombol saat layar berubah (masuk/keluar fullscreen)
    document.addEventListener('fullscreenchange', updateBtnText);
    document.addEventListener('webkitfullscreenchange', updateBtnText); // Safari

    function updateBtnText() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        btnFullscreen.innerHTML = '🔍 Perbesar Layar';
      } else {
        btnFullscreen.innerHTML = '🗗 Perkecil Layar';
      }
    }
  </script>
</body>
</html>
